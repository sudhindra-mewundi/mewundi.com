        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .corner { position: fixed; width: 60px; height: 60px; opacity: 0.4; z-index: 2; }
    .corner--tl { top: 32px; left: 32px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 32px; right: 32px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* Stage uses negative margin to shift visual centre down to the logo */
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 40px;
      /* Pull the whole block upward so the logo sits at visual centre */
      margin-top: -80px;
    }

    .deity-wrap {
      width: min(160px, 38vw);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }
    .deity-wrap img {
      width: 100%; height: auto; display: block;
      border: 1px solid rgba(201,168,76,0.4);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .deity-caption {
      margin-top: 10px;
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(9px, 2.2vw, 11px);
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .line-divider {
      width: min(180px, 45vw);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 18px 0;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    .logo-wrap {
      width: min(520px, 88vw);
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
    }
    .logo-wrap svg { width: 100%; height: auto; display: block; }

    .divider {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 20px 0 18px;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .map-btn {
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 11px 26px;
      border: 1px solid var(--gold); background: transparent; color: var(--gold);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s, color 0.3s;
    }
    .map-btn:hover { background: var(--gold); color: #fff; }
    .map-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MAP PAGE */
    #mappage { display: flex; flex-direction: column; background: var(--off-white); }
    .map-header { flex-shrink: 0; border-bottom: 1px solid rgba(201,168,76,0.3); padding-bottom: 14px; }
    .map-header-top { display: flex; align-items: center; padding: 14px 16px 0; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border: 1px solid var(--gold); background: transparent; color: var(--gold);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s, color 0.3s; white-space: nowrap;
    }
    .back-btn:hover { background: var(--gold); color: #fff; }
    .back-btn svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }
    .map-header-logo { display: flex; flex-direction: column; align-items: center; padding: 10px 16px 0; }
    .map-logo { width: min(300px, 72vw); }
    .map-logo svg { width: 100%; height: auto; display: block; }
    .map-subtitle { margin-top: 6px; font-size: 10px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; text-align: center; }
    #map { flex: 1; width: 100%; min-height: 0; }
    .gold-marker {
      background: var(--gold); border: 2px solid #fff; border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.35), 0 2px 8px rgba(0,0,0,0.25);
      width: 14px !important; height: 14px !important;
    }
    .leaflet-popup-content-wrapper {
      background: #fff; border-radius: 4px; border-top: 3px solid var(--gold);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12); font-family: 'Cormorant Garamond', Georgia, serif;
    }
    .leaflet-popup-content { margin: 10px 14px; }
    .popup-city { font-size: 16px; font-weight: 600; color: #0A0A0A; letter-spacing: 1px; }
    .popup-region { font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-top: 3px; }
    .leaflet-popup-tip { background: #fff; }
  </style>
</head>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const locations = [
      { name: "Dharwar",      region: "Karnataka, India",           lat: 15.4589,  lng: 75.0078  },
      { name: "Hubli",        region: "Karnataka, India",           lat: 15.3647,  lng: 75.1240  },
      { name: "Bangalore",    region: "Karnataka, India",           lat: 12.9716,  lng: 77.5946  },
      { name: "Kolhapur",     region: "Maharashtra, India",         lat: 16.7050,  lng: 74.2433  },
      { name: "Mumbai",       region: "Maharashtra, India",         lat: 19.0760,  lng: 72.8777  },
      { name: "Melbourne",    region: "Victoria, Australia",        lat: -37.8136, lng: 144.9631 },
      { name: "Maryland",     region: "Maryland, USA",               lat: 39.0458,  lng: -76.6413 },
      { name: "Philadelphia", region: "Pennsylvania, USA",          lat: 39.9526,  lng: -75.1652 },
      { name: "Fort Mill",    region: "South Carolina, USA",        lat: 35.0079,  lng: -80.9440 }
    ];
    let mapInitialised = false, leafletMap;
    function initMap() {
      if (mapInitialised) return;
      mapInitialised = true;
      leafletMap = L.map("map", { center: [20, 50], zoom: 3 });
      L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
        { attribution: "Tiles &copy; Esri", maxZoom: 18 }).addTo(leafletMap);
      const goldIcon = L.divIcon({ className: "gold-marker", iconSize: [14,14], iconAnchor: [7,7], popupAnchor: [0,-12] });
      locations.forEach(loc => {
        L.marker([loc.lat, loc.lng], { icon: goldIcon }).addTo(leafletMap)
          .bindPopup("<div class=\"popup-city\">" + loc.name + "</div><div class=\"popup-region\">" + loc.region + "</div>");
      });
      L.polyline(locations.map(l => [l.lat, l.lng]), { color: "#C9A84C", weight: 1.2, opacity: 0.5, dashArray: "5,6" }).addTo(leafletMap);
    }
    function showMap() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("mappage").classList.remove("hidden");
      setTimeout(() => { initMap(); if (leafletMap) leafletMap.invalidateSize(); }, 300);
      history.pushState({ page: "map" }, "", "#map");
    }
    function showHome() {
      document.getElementById("mappage").classList.add("hidden");
      document.getElementById("home").classList.remove("hidden");
      history.pushState({ page: "home" }, "", " ");
    }
    window.addEventListener("popstate", function() {
      if (location.hash === "#map") showMap();
      else { document.getElementById("mappage").classList.add("hidden"); document.getElementById("home").classList.remove("hidden"); }
    });
  </script>
</body>
</html>
